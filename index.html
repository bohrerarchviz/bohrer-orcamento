<!doctype html>
<html lang="en">

      <input type="email" name="email" />

      <input type="text" name="projectType" />
      <input type="text" name="needsExternalImages" />

      <input type="text" name="includeSurroundings" />

      <input type="text" name="includeHumanization" />

      <input type="text" name="deadline" />
      <input type="text" name="isUrgent" />
      <textarea name="urgencyReason"></textarea>
      <textarea name="additionalNotes"></textarea>
      <textarea name="formattedEmailBody"></textarea>

    <script type="module" src="/src/main.tsx"></script>

</html>
